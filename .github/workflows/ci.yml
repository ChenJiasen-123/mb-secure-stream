name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mbt-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          # Try multiple download sources
          if curl -fsSL "https://github.com/moonbitlang/moon/releases/latest/download/moon-linux-x86_64.tar.gz" -o /tmp/moon.tar.gz 2>/dev/null; then
            tar -xzf /tmp/moon.tar.gz -C /tmp
            sudo mv /tmp/moon /usr/local/bin/moon
          elif curl -fsSL "https://github.com/moonbitlang/moon/releases/latest/download/moon-x86_64-unknown-linux-musl.tar.gz" -o /tmp/moon.tar.gz 2>/dev/null; then
            tar -xzf /tmp/moon.tar.gz -C /tmp
            sudo mv /tmp/moon /usr/local/bin/moon
          else
            echo "Failed to download MoonBit"
            exit 1
          fi
          moon version

      - name: moon check -d
        shell: bash
        run: moon check -d

      - name: moon fmt --check
        shell: bash
        run: |
          moon fmt --check crypto/mb-aead crypto/mb-chacha \
            crypto/mb-getrandom crypto/mb-hash crypto/mb-hkdf \
            crypto/mb-hmac crypto/mb-jwt crypto/mb-p256 \
            crypto/mb-poly1305 gateway

      - name: moon info
        shell: bash
        run: moon info

      - name: moon test
        shell: bash
        run: moon test