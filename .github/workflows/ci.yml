name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install.sh | sh
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon check -d

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install.sh | sh
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: |
          moon fmt --check crypto/mb-aead crypto/mb-chacha \
            crypto/mb-getrandom crypto/mb-hash crypto/mb-hkdf \
            crypto/mb-hmac crypto/mb-jwt crypto/mb-p256 \
            crypto/mb-poly1305 gateway

  info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install.sh | sh
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon info

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install.sh | sh
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon test
